<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Resume Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b6fd4;
            --primary-end: #06b6d4;
            --bg: #f0f2f8;
            --white: #ffffff;
            --navbar: #4361d8;
            --navbar-end: #3b82f6;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --card-shadow: 0 4px 24px rgba(59,111,212,0.10);
            --grad: linear-gradient(135deg, var(--primary) 0%, var(--primary-end) 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: linear-gradient(90deg, var(--navbar) 0%, var(--navbar-end) 100%);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 12px rgba(59,111,212,0.18);
        }
        .navbar-brand { font-size: 1.25em; font-weight: 800; color: white; letter-spacing: -0.5px; }
        .navbar-brand span { font-weight: 400; opacity: 0.85; }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .signup-wrapper { width: 100%; max-width: 440px; }

        .page-title { text-align: center; margin-bottom: 28px; }
        .page-title .icon { font-size: 2.5em; margin-bottom: 10px; }
        .page-title h1 {
            font-size: 2em; font-weight: 800;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .page-title p { color: var(--muted); font-size: 0.92em; }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 36px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.88em;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1em;
            pointer-events: none;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        select {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95em;
            font-family: inherit;
            color: var(--text);
            background: #f8fbff;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,111,212,0.12);
            background: white;
        }

        /* Role toggle buttons */
        .role-toggle {
            display: flex;
            gap: 10px;
            margin-top: 2px;
        }
        .role-btn {
            flex: 1;
            padding: 12px 10px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: #f8fbff;
            font-family: inherit;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .role-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .role-btn.active {
            background: var(--grad);
            border-color: transparent;
            color: white;
            box-shadow: 0 3px 12px rgba(59,111,212,0.28);
        }

        .password-hint {
            font-size: 0.78em;
            color: var(--muted);
            margin-top: 6px;
        }

        .btn-primary {
            width: 100%;
            background: var(--grad);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(59,111,212,0.3);
            margin-top: 8px;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59,111,212,0.4);
        }
        .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: var(--muted);
            font-size: 0.85em;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .login-link {
            text-align: center;
            font-size: 0.9em;
            color: var(--muted);
        }
        .login-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
        .login-link a:hover { text-decoration: underline; }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88em;
            font-weight: 600;
            margin-bottom: 18px;
            display: none;
        }
        .alert.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }

        .spinner-inline {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">AI <span>Resume</span>Analyzer</div>
    </nav>

    <div class="page">
        <div class="signup-wrapper">
            <div class="page-title">
                <div class="icon">✨</div>
                <h1>Create Account</h1>
                <p>Join AI Resume Analyzer and boost your career</p>
            </div>

            <div class="card">
                <div class="alert" id="alertBox"></div>

                <!-- Role Selector -->
                <div class="form-group">
                    <label>🎭 Sign up as</label>
                    <div class="role-toggle">
                        <button type="button" class="role-btn active" id="roleCandidate" onclick="setRole('candidate')">
                            🧑‍💼 Candidate
                        </button>
                        <button type="button" class="role-btn" id="roleAdmin" onclick="setRole('admin')">
                            🛡️ Admin
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>👤 Full Name</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="name" placeholder="Enter your full name">
                    </div>
                </div>

                <div class="form-group">
                    <label>🏷️ Username</label>
                    <div class="input-wrap">
                        <span class="input-icon">🏷️</span>
                        <input type="text" id="username" placeholder="Choose a username">
                    </div>
                </div>

                <div class="form-group">
                    <label>📧 Email</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                </div>

                <div class="form-group">
                    <label>🔒 Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Create a password">
                    </div>
                    <div class="password-hint">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label>🔒 Confirm Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" placeholder="Repeat your password">
                    </div>
                </div>

                <button class="btn-primary" id="signupBtn" onclick="handleSignup()">
                    🚀 Create Account
                </button>

                <div class="divider">or</div>

                <div class="login-link">
                    Already have an account? <a href="/login">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Track selected role
        let selectedRole = 'candidate';

        function setRole(role) {
            selectedRole = role;
            document.getElementById('roleCandidate').classList.toggle('active', role === 'candidate');
            document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleSignup();
        });

        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            box.textContent = message;
            box.className = 'alert ' + type;
        }

        async function handleSignup() {
            const name     = document.getElementById('name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;
            const btn      = document.getElementById('signupBtn');

            if (!name || !username || !email || !password || !confirm) {
                showAlert('Please fill in all fields.', 'error');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showAlert('Passwords do not match.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-inline"></span>Creating account...';

            try {
                const res = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, username, email, password, role: selectedRole })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert('Account created! Sending OTP to your email...', 'success');
                    // Redirect to OTP verification page with email
                    setTimeout(() => {
                        window.location.href = '/verify?email=' + encodeURIComponent(email);
                    }, 1200);
                } else {
                    showAlert(data.error || 'Could not create account.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Create Account';
                }
            } catch (err) {
                showAlert('Server error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '🚀 Create Account';
            }
        }
    </script>
</body>
</html>
