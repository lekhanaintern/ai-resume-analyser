<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AI ResumeAnalyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b;
      --blue: #2563eb; --blue-glow: rgba(37,99,235,0.12);
      --red-pale: #fef2f2;
    }
    html, body {
      height: 100%; min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6em; margin: 0 auto 12px;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
    }
    .brand h1 { font-size: 1.3em; font-weight: 700; }
    .brand p  { color: var(--muted); font-size: 0.88em; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    input[type="password"] {
      width: 100%; padding: 11px 40px 11px 38px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.95em; font-family: inherit; color: var(--text);
      background: #f8fafc; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); background: white; }
    .toggle-pw {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 1em;
    }
    .hint { font-size: 0.78em; color: var(--muted); margin-top: 5px; }
    .alert {
      padding: 10px 14px; border-radius: 8px;
      font-size: 0.88em; font-weight: 500; margin-bottom: 16px; display: none;
    }
    .alert.error   { background: var(--red-pale); color: #991b1b; border: 1px solid #fecaca; display: block; }
    .alert.success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
    .btn {
      width: 100%; background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white; border: none; padding: 12px; font-size: 0.95em;
      border-radius: 50px; cursor: pointer; font-weight: 600; font-family: inherit;
      transition: all 0.2s; box-shadow: 0 4px 14px rgba(37,99,235,0.3); margin-top: 4px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; transform: none; }
    .back-link { text-align: center; margin-top: 18px; font-size: 0.88em; color: var(--muted); }
    .back-link a { color: var(--blue); font-weight: 600; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block; width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-right: 6px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🔒</div>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <div class="alert" id="alertBox"></div>

    <div class="form-group">
      <label>🔒 New Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter new password"/>
        <button type="button" class="toggle-pw" onclick="togglePw('password', this)">👁️</button>
      </div>
      <div class="hint">Minimum 6 characters</div>
    </div>

    <div class="form-group">
      <label>🔒 Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="confirmPassword" placeholder="Repeat new password"/>
        <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)">👁️</button>
      </div>
    </div>

    <button class="btn" id="submitBtn" onclick="handleReset()">
      ✅ Reset Password
    </button>

    <div class="back-link">
      <a href="/login">← Back to Login</a>
    </div>
  </div>
</div>

<script>
  // Manually parse access_token from hash to avoid URLSearchParams issues
  function getHashParam(name) {
    const hash = window.location.hash.substring(1);
    const parts = hash.split('&');
    for (const part of parts) {
      const [key, val] = part.split('=');
      if (key === name) return decodeURIComponent(val || '');
    }
    return null;
  }

  const accessToken = getHashParam('access_token');

  // If no token, show error and disable button
  if (!accessToken) {
    const box = document.getElementById('alertBox');
    box.textContent = 'Invalid or expired reset link. Please request a new one.';
    box.className = 'alert error';
    document.getElementById('submitBtn').disabled = true;
  }

  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
    else                         { inp.type = 'password'; btn.textContent = '👁️'; }
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert ' + type;
  }

  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');

    if (!password || !confirm) { showAlert('Please fill in both fields.', 'error'); return; }
    if (password.length < 6)   { showAlert('Password must be at least 6 characters.', 'error'); return; }
    if (password !== confirm)  { showAlert('Passwords do not match.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Resetting...';

    try {
      const res  = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ access_token: accessToken, password })
      });
      const data = await res.json();

      if (data.success) {
        showAlert('Password reset successfully! Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 2000);
      } else {
        showAlert(data.error || 'Could not reset password.', 'error');
        btn.disabled = false;
        btn.innerHTML = '✅ Reset Password';
      }
    } catch (err) {
      showAlert('Server error. Please try again.', 'error');
      btn.disabled = false;
      btn.innerHTML = '✅ Reset Password';
    }
  }
</script>
</body>
</html>
